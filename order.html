<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <link rel="icon" href="Xicon-Tab.png" type="image/png">
    <title>Pesanan Makanan</title>
    
    
</head>
<body>

  <div class="app">


<header class="topbar">

<!-- <button onclick="goBack()" class="btn-back">
←
</button> -->

<div class="header">
  PESANAN MAKANAN 
  <div id="status" class="status">...</div>
  <span id="printerStatus" style="margin-left:10px">🖨️ 🔴</span>
  <button onclick="connectPrinter()" style="float:right">🖨️</button>
</div>

</header>


<div class="form">
  <input id="nama" placeholder="Atas Nama">
  <input id="meja" placeholder="Meja Nomor">
</div>

<div class="category">
  <button class="active" onclick="setCat('makanan',this)">Makanan</button>
  <button onclick="setCat('minuman',this)">Minuman</button>
  <button onclick="setCat('snack',this)">Snack</button>
  <button onclick="setCat('addon',this)">Add-on</button>
</div>

<div class="content">

  <div class="menu" id="menu"></div>

  <div class="order">
    <div class="order-list" id="order"></div>
    <div class="total" id="total">Total: Rp 0</div>
    <div class="bottom-btn">
      <button onclick="printOrder()">PRINT</button>
      <button id="btnSave" onclick="saveOrder()">SIMPAN</button>
    </div>
  </div>

</div>
</div>

<div id="toast" class="toast"></div>

<script>

const API_URL ="https://script.google.com/macros/s/AKfycbyGmDQj-Z7T_rkVxADzJ6UUaGQSVy1Mi_MQWeShnAVarzITvt3FfnlD2Kq8LERLmUJ4/exec";

let menus = {};
let bleDevice = null;
let bleCharacteristic = null;
let resto = {};

async function loadResto(){

  try{

    const res = await fetch(API_URL + "?action=RESTO");
    const json = await res.json();

     console.log("RESTO RESPONSE:", json);

    if(!json.success){
      console.log("Gagal ambil data resto");
      return;
    }

    resto = json.data;

    console.log("Resto loaded:", resto);

  }catch(err){

    console.log("Error load resto", err);

  }
}


function updatePrinterStatus(connected){

  const el = document.getElementById("printerStatus");

  if(connected){
    el.innerText = "🖨️ 🟢";
  }else{
    el.innerText = "🖨️ 🔴";
  }
}

async function connectPrinter(){


  try{

    bleDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
    });

    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    const server = await bleDevice.gatt.connect();

    const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');

    bleCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

    localStorage.setItem("printerId", bleDevice.id);

    updatePrinterStatus(true);

    alert("Printer connected!");

  }catch(err){
    console.error(err); 
    updatePrinterStatus(false);
    alert("Gagal connect printer");

  }
}

async function onDisconnected(){

  console.log("Printer disconnected");

  updatePrinterStatus(false);

  // coba reconnect otomatis
  try{

    const server = await bleDevice.gatt.connect();

    const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');

    bleCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

    updatePrinterStatus(true);

    console.log("Reconnect success");

  }catch(err){

    console.log("Reconnect gagal");
  }
}

async function autoReconnectPrinter(){

  const savedId = localStorage.getItem("printerId");

  if(!savedId) return;

  try{

    const devices = await navigator.bluetooth.getDevices();

    const device = devices.find(d => d.id === savedId);

    if(!device){
      console.log("Printer tidak ditemukan");
      return;
    }

    bleDevice = device;

    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    const server = await bleDevice.gatt.connect();

    const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');

    bleCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

    updatePrinterStatus(true);

    console.log("Auto reconnect sukses");

  }catch(err){

    console.log("Auto reconnect gagal", err);
    updatePrinterStatus(false);

  }
}

window.addEventListener("load", ()=>{
  autoReconnectPrinter();
});

function textToBytes(text){
  return new TextEncoder().encode(text);
}

async function sendInChunks(data){

  const chunkSize = 80;

  for(let i=0; i<data.length; i+=chunkSize){

    const chunk = data.slice(i, i+chunkSize);

    try{

      if (bleCharacteristic.writeValueWithoutResponse) {
        await bleCharacteristic.writeValueWithoutResponse(chunk);
      } else {
        await bleCharacteristic.writeValue(chunk);
      }

      await new Promise(r=>setTimeout(r, 120));

    }catch(err){

      console.error("Chunk gagal dikirim", err);
      throw err;

    }
  }
}


async function loadMenu(){

  const res = await fetch(API_URL + "?action=menu");
  const json = await res.json();

  if(!json.success) return alert("Menu gagal diambil");

  menus = {
    makanan: [],
    minuman: [],
    snack: [],
    addon: []
  };

  json.data.forEach(m=>{
    menus[m.kategori].push({
      menu_id:m.menu_id,
      n:m.nama,
      p:m.harga
    });
  });

  renderMenu();
}

let cat="makanan";
let orders=JSON.parse(localStorage.getItem("orders"))||{};
let offlineQueue = JSON.parse(localStorage.getItem("offlineQueue")) || [];

function saveQueue(){
  localStorage.setItem("offlineQueue", JSON.stringify(offlineQueue));
  updateStatus();
}

let isSending = false;

async function sendQueue(){

  if(isSending) return;
  if(offlineQueue.length === 0) return;

  isSending = true;

  try{

    const order = offlineQueue[0];

    console.log("Kirim:", order);

    const res = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"order",
        payload:order
      })
    });

    const json = await res.json();
    console.log("Response:", json);

    if(json.success || json.message === "duplicate ignored"){

      offlineQueue.shift();
      saveQueue();
      updateStatus();
    }

  }catch(err){
    console.log("Masih offline / gagal kirim");
  }

  isSending = false;

  sendQueue();
}



window.addEventListener("online", () => {
  console.log("Kembali online, kirim queue...");

    sendQueue();
    updateStatus();

});



function setCat(c,b){
  cat=c;
  document.querySelectorAll('.category button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  renderMenu();
}

function renderMenu(){
  const m=document.getElementById("menu");
  m.innerHTML="";
  menus[cat].forEach(i=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`<b>${i.n}</b><br><small>Rp ${i.p.toLocaleString()}</small>`;
    d.onclick=()=>add(i);
    m.appendChild(d);
  });
}


function add(i){

  if(!orders[i.menu_id]){
    orders[i.menu_id] = {
      menu_id:i.menu_id,
      n:i.n,
      p:i.p,
      q:1
    };
  }else{
    orders[i.menu_id].q++;
  }

  sync();
}


function qty(id,v){

  if(!orders[id]) return;

  orders[id].q += v;

  if(orders[id].q <= 0){
    delete orders[id];
  }

  sync();
}

function sync(){
  localStorage.setItem("orders",JSON.stringify(orders));
  renderOrder();
}

function renderOrder(){
  const o=document.getElementById("order");
  const t=document.getElementById("total");
  o.innerHTML="";
  let sum=0;
  Object.values(orders).forEach(i=>{
    sum+=i.q*i.p;
    o.innerHTML+=`
    <div class="row">
      <div>${i.n}</div>
      <div>${i.q}</div>
      <div class="action">
        <button onclick="qty('${i.menu_id}',-1)">−</button>
        <button onclick="qty('${i.menu_id}',1)">+</button>
      </div>
    </div>`;
  });
  t.innerText="Total: Rp "+sum.toLocaleString();
}

async function saveOrder(){

  const btn = document.getElementById("btnSave");
    
    if(btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "MENYIMPAN...";

  const nama = document.getElementById("nama").value;
  const meja = document.getElementById("meja").value;

  if(!nama ){ //|| !meja
    alert("Nama wajib diisi");
    btn.disabled = false;
    btn.innerText = "SIMPAN";
    return;
  }
  // 🔥 WAJIB: tunggu resto kalau belum ada
  if(!resto.nama){
    console.log("Menunggu data resto...");
    await loadResto(); // ⬅️ INI KUNCINYA
  }

  if(!resto.nama){
    alert("Data resto gagal dimuat!");
    btn.disabled = false;
    btn.innerText = "SIMPAN";
    return;
  }

  const items = Object.values(orders).map(i=>({
    menu_id:i.menu_id,
    nama:i.n,
    qty:i.q,
    harga:i.p
  }));

  const total = items.reduce((s,i)=>s+(i.qty*i.harga),0);

    const orderData = {
  id: Date.now(), // 🔥 penting (unique id)
  nama:nama,
  meja:meja,
  total:total,
  items:items,
  sent:false // 🔥 status kirim
};

  // simpan ke queue
  offlineQueue.push(orderData);
  saveQueue();

  // kirim queue
  sendQueue();

  // print 
    if(bleCharacteristic){
    try{
     await printOrder();
     }catch(e){
     console.log("Print gagal tapi save tetap jalan");
     }
}


  setTimeout(()=>{
  orders = {};
  localStorage.removeItem("orders");
  renderOrder();
    }, 300);

  document.getElementById("nama").value="";
  document.getElementById("meja").value="";

  btn.disabled=false;
  btn.innerText="SIMPAN";
  
    alert("Order disimpan");
    //showToast("Order disimpan", "success");
    //showToast("Gagal simpan", "error");
}

function updateStatus(){

  const status = document.getElementById("status");

  const pending = offlineQueue.length;

  if(navigator.onLine){

    status.className="status online";

    if(pending > 0){
      status.innerText = "🟢 ONLINE ("+pending+" pending sync)";
    }else{
      status.innerText = "🟢 ONLINE";
    }

  }else{

    status.className="status offline";
    status.innerText = "🔴 OFFLINE ("+pending+" pending)";
  }
}

window.addEventListener("online", () => {

  updateStatus();
  sendQueue();

});

window.addEventListener("offline", () => {

  updateStatus();

});

//Pengaturan fungsi print
function formatLine(name, qty, price){

  const nameWidth = 18;
  const qtyWidth = 4;
  const priceWidth = 10;

  const n = name.padEnd(nameWidth," ");
  const q = qty.toString().padStart(qtyWidth," ");
  const p = price.toString().padStart(priceWidth," ");

  return n + q + p;
}



async function printImage(canvas){

  const ctx = canvas.getContext("2d");
  const width = canvas.width;
  const height = canvas.height;

  const bytesPerRow = Math.ceil(width / 8);

  const imageData = ctx.getImageData(0, 0, width, height).data;

  const data = [];

  for(let y = 0; y < height; y++){
    for(let x = 0; x < bytesPerRow; x++){

      let byte = 0;

      for(let bit = 0; bit < 8; bit++){
        const px = x * 8 + bit;

        if(px < width){
          const idx = (y * width + px) * 4;
          const color = imageData[idx];

          if(color < 128){
            byte |= (1 << (7 - bit));
          }
        }
      }

      data.push(byte);
    }
  }

  const xL = bytesPerRow % 256;
  const xH = Math.floor(bytesPerRow / 256);
  const yL = height % 256;
  const yH = Math.floor(height / 256);

  const command = [
    0x1D, 0x76, 0x30, 0x00,
    xL, xH, yL, yH,
    ...data
  ];

  // 🔥 KIRIM PER BARIS BIAR GAK CRASH
  const chunkSize = 100;
  for(let i=0; i<command.length; i+=chunkSize){
    const chunk = command.slice(i, i+chunkSize);
    await sendInChunks(new Uint8Array(chunk));
    await new Promise(r=>setTimeout(r, 50));
  }
}



async function printOrder(){

  if(!bleCharacteristic){
    alert("Printer belum connect!");
    return;
  }

  const nama = document.getElementById("nama").value;
  const now = new Date();
  const tanggal = now.toLocaleString();

  let text = "";

  text += "\x1B\x40";
  text += "\x1B\x61\x01";
  text += "\x1B\x45\x01";

  text += (resto.nama || "") + "\n";

  text += "\x1B\x45\x00";
  text += (resto.alamat || "") + "\n";
  text += "Telp: " + (resto.telp || "") + "\n";

  text += "----------------------------\n";

  text += "\x1B\x61\x00";
  text += "Tanggal : " + tanggal + "\n";
  text += "Customer : " + nama + "\n";

  text += "----------------------------\n";

  let total = 0;

  Object.values(orders).forEach(i=>{
    const subtotal = i.q * i.p;
    total += subtotal;

    text += i.n + "\n";

    const left = i.q + " x " + i.p.toLocaleString();
    const right = subtotal.toLocaleString();

    const space = 32 - (left.length + right.length);
    text += left + " ".repeat(space > 0 ? space : 1) + right + "\n";
  });

  text += "----------------------------\n";

  const totalVal = total.toLocaleString();
  const space = 32 - ("TOTAL".length + totalVal.length);

  text += "TOTAL" + " ".repeat(space > 0 ? space : 1) + totalVal + "\n\n";

  text += "\x1B\x61\x01";
  text += "Terima kasih\n";

  // ✅ GANTI QR JADI LINK TEXT
  text += "Kunjungi Kami di:\n";
  text += (resto.maps) + "\n\n";

  try{

    const textData = new Uint8Array([...text].map(c => c.charCodeAt(0)));
    await sendInChunks(textData);

    await new Promise(r=>setTimeout(r, 200));

    const cut = new Uint8Array([0x1D, 0x56, 0x41]);
    await sendInChunks(cut);

  }catch(err){
    console.error(err);
    alert("Gagal print");
  }
}


function goBack(){
window.location.href = "index.html";
}

loadMenu();
loadResto();
renderOrder();
sendQueue();
updateStatus();

setInterval(()=>{
  if(navigator.onLine){
    sendQueue();
  }
}, 5000);

</script>
